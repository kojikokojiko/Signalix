# API サーバー用 Air 設定
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  delay = 500
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  kill_delay = "2s"

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"
