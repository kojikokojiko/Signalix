app = "signalix-worker"
primary_region = "nrt"

[build]
  dockerfile = "backend/Dockerfile"
  [build.args]
    BUILD_TARGET = "worker"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[processes]
  app = "./worker"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
