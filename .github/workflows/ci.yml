name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: signalix_test
          POSTGRES_USER: signalix
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go.work.sum
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Run unit tests
        working-directory: backend
        run: go test ./...
      - name: Run migrations
        working-directory: backend
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path ../migrations -database "postgres://signalix:test_password@localhost:5432/signalix_test?sslmode=disable" up
        env:
          DATABASE_URL: postgres://signalix:test_password@localhost:5432/signalix_test?sslmode=disable
      - name: Run integration tests
        working-directory: backend
        run: go test -tags=integration ./internal/integration/... -v -timeout 60s
        env:
          DATABASE_URL: postgres://signalix:test_password@localhost:5432/signalix_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Run unit tests
        working-directory: frontend
        run: npm run test:ci
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          BACKEND_URL: http://localhost:8080

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
