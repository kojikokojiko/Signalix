services:
  # ─────────────────────────────────────────
  # PostgreSQL (pgvector 拡張込み)
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signalix_dev}
      POSTGRES_USER: ${POSTGRES_USER:-signalix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalix}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # マイグレーション (起動時に1回だけ実行)
  # ─────────────────────────────────────────
  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-signalix}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-signalix_dev}?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ─────────────────────────────────────────
  # API サーバー (Go + Air ホットリロード)
  # ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-signalix}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-signalix_dev}?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # ワーカー (Go + Air ホットリロード)
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: ["air", "-c", ".air.worker.toml"]
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-signalix}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-signalix_dev}?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # フロントエンド (Next.js dev server)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # node_modules はコンテナ内のものを使う
    environment:
      BACKEND_URL: http://api:8080
    depends_on:
      - api

volumes:
  postgres_data:
